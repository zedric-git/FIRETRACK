<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIRETRACK — Evac Center Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#09131C; }
#map { width:100%; height:100%; }
#theme-btn {
  position:absolute; top:10px; right:10px; z-index:1001;
  background:#0C1A26; border:1px solid #253A52;
  color:#7A9BB8; font-family:Consolas,monospace; font-size:10px;
  font-weight:bold; letter-spacing:1px; padding:6px 12px;
  cursor:pointer; display:flex; align-items:center; gap:7px; user-select:none;
}
#theme-btn:hover { background:#0F2035; border-color:#4A8EC2; color:#C8D8E8; }
#drop-banner, #request-banner, #reject-banner {
  display:none; position:absolute; z-index:1001;
  font-family:Consolas,monospace; font-size:10px; font-weight:bold;
  letter-spacing:2px; padding:7px 18px; pointer-events:none; white-space:nowrap;
  top:10px; left:50%; transform:translateX(-50%);
}
#drop-banner    { background:#1A4A7A; color:#C8D8E8; border:1px solid #4A8EC2; }
#request-banner { background:#091A10; color:#4A9A60; border:1px solid #2A6A40; }
#reject-banner  { top:auto; bottom:16px; pointer-events:none;
                  background:#1A0808; color:#C05050; border:1px solid #7A2020; }
.leaflet-popup-content-wrapper {
  background:#0C1A26 !important; color:#C8D8E8;
  border:1px solid #253A52 !important; border-radius:0 !important;
  font-family:Consolas,monospace; font-size:11px;
  box-shadow:0 4px 20px rgba(0,0,0,0.8) !important;
}
.leaflet-popup-tip { background:#0C1A26 !important; }
.leaflet-popup-content { margin:12px 14px !important; min-width:190px; line-height:1.8; }
.p-title { font-size:11px; font-weight:bold; letter-spacing:1px;
            border-bottom:1px solid #172435; padding-bottom:5px; margin-bottom:5px; }
.p-row { color:#3A5570; margin-bottom:1px; }
.p-row span { color:#C8D8E8; }
.p-bar-bg { background:#172435; height:3px; margin:6px 0; }
.p-bar-fill { height:3px; }
.p-btn { margin-top:7px; width:100%; background:#1A4A7A; border:none;
  color:#C8D8E8; font-family:Consolas,monospace; font-size:9px;
  font-weight:bold; letter-spacing:1px; padding:7px 0; cursor:pointer; }
.p-btn:hover { background:#215E9A; }
.p-btn-ghost { margin-top:5px; width:100%; background:transparent; border:1px solid #3A5570;
  color:#7A9BB8; font-family:Consolas,monospace; font-size:9px;
  font-weight:bold; letter-spacing:1px; padding:6px 0; cursor:pointer; }
.p-btn-ghost:hover { background:#0F2035; color:#C8D8E8; }
.p-btn-red { margin-top:5px; width:100%; background:transparent; border:1px solid #7A2020;
  color:#C05050; font-family:Consolas,monospace; font-size:9px;
  font-weight:bold; letter-spacing:1px; padding:6px 0; cursor:pointer; }
.p-btn-red:hover { background:#1A0808; }
.leaflet-control-zoom a {
  background:#0C1A26 !important; color:#7A9BB8 !important; border-color:#253A52 !important; }
.confirm-shell {
  position:fixed; inset:0; z-index:3000; display:none;
  align-items:center; justify-content:center; padding:18px;
  background:rgba(3,8,13,0.72); backdrop-filter:blur(4px);
  font-family:Consolas,monospace; color:#C8D8E8;
}
.confirm-shell.is-open { display:flex; }
.confirm-dialog {
  width:min(420px,100%); background:#0C1A26;
  border:1px solid #3A5570; border-radius:8px;
  box-shadow:0 18px 54px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow:hidden;
}
.confirm-head {
  display:flex; align-items:center; gap:12px;
  padding:18px 20px 14px; border-bottom:1px solid #172435;
}
.confirm-mark {
  width:34px; height:34px; flex:0 0 34px; display:grid; place-items:center;
  background:#1A0808; border:1px solid #7A2020; color:#E07070;
  font-size:18px; font-weight:bold; line-height:1; border-radius:50%;
}
.confirm-title {
  color:#F0F6FF; font-size:14px; line-height:1.25;
  font-weight:bold; letter-spacing:1px;
}
.confirm-subtitle {
  margin-top:3px; color:#7A9BB8; font-size:10px; letter-spacing:1px;
  overflow-wrap:anywhere;
}
.confirm-body { padding:16px 20px 18px; }
.confirm-note {
  border-left:3px solid #C05050; background:#120D11;
  color:#B8C8D8; padding:10px 12px; font-size:11px; line-height:1.55;
}
.confirm-actions {
  display:flex; justify-content:flex-end; gap:10px;
  padding:0 20px 20px;
}
.confirm-btn {
  min-width:112px; border:1px solid #3A5570; background:transparent;
  color:#C8D8E8; font-family:Consolas,monospace; font-size:10px;
  font-weight:bold; letter-spacing:1px; padding:9px 14px; cursor:pointer;
}
.confirm-btn:hover, .confirm-btn:focus-visible {
  outline:none; background:#0F2035; border-color:#4A8EC2;
}
.confirm-btn-danger {
  background:#7A2020; border-color:#C05050; color:#FFFFFF;
}
.confirm-btn-danger:hover, .confirm-btn-danger:focus-visible {
  background:#9A2828; border-color:#E07070;
}
</style>

<body>
<div id="drop-banner">+ CLICK WITHIN YOUR BARANGAY TO PLACE CENTER</div>
<div id="request-banner">REQUEST MODE — Click a faded pin to request access</div>
<div id="reject-banner">x PLACEMENT OUTSIDE YOUR BOUNDARY</div>
<button id="theme-btn" onclick="toggleTheme()">
  <span id="theme-icon">&#x2600;</span>
  <span id="theme-label">LIGHT MODE</span>
</button>
<div id="map"></div>
<div id="delete-confirm" class="confirm-shell" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title" aria-describedby="delete-confirm-note">
  <div class="confirm-dialog">
    <div class="confirm-head">
      <div class="confirm-mark">!</div>
      <div>
        <div id="delete-confirm-title" class="confirm-title">Delete evacuation center?</div>
        <div id="delete-confirm-name" class="confirm-subtitle"></div>
      </div>
    </div>
    <div class="confirm-body">
      <div id="delete-confirm-note" class="confirm-note">
        All families assigned to this center must be unassigned first. This action cannot be undone.
      </div>
    </div>
    <div class="confirm-actions">
      <button type="button" id="delete-cancel-btn" class="confirm-btn">CANCEL</button>
      <button type="button" id="delete-confirm-btn" class="confirm-btn confirm-btn-danger">DELETE CENTER</button>
    </div>
  </div>
</div>

// BRIDGE
// ═══════════════════════════════════════════════════════════════
function send(payload) { window.chrome.webview.postMessage(JSON.stringify(payload)); }

window.chrome.webview.addEventListener('message', function(e) {
  try {
    var msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'init_map':
        myBarangay = msg.barangay || '';
        showBarangayBorder();
        break;
      case 'load_centers':
        loadCenters(msg.own||[], msg.cross||[], msg.city||[]);
        break;
      case 'load_neighbors':
        loadNeighbors(msg.neighbors||[]);
        enterRequestMode();
        break;
      case 'exit_request_mode': exitRequestMode(); break;
      case 'enable_drop_mode':  enableDropMode();  break;
      case 'cancel_drop_mode':  disableDropMode(); break;
    }
  } catch(err) { console.error('Bridge error', err); }
});

// ═══════════════════════════════════════════════════════════════
// BOUNDARY HELPERS
// ═══════════════════════════════════════════════════════════════
function clearBoundaryLayers() {
  if (borderLayer) { map.removeLayer(borderLayer); borderLayer = null; }
  if (dimLayer)    { map.removeLayer(dimLayer);    dimLayer    = null; }
}

// Dim mask: world polygon with hole cut at the given [lat,lng] ring
function makeDimMask(latLngCoords) {
  var worldRing = [[-180,-90],[-180,90],[180,90],[180,-90],[-180,-90]];
  var hole = latLngCoords.map(function(p){ return [p[1],p[0]]; }); // [lng,lat] for GeoJSON
  return L.geoJSON({
    type:'Feature',
    geometry:{ type:'Polygon', coordinates:[worldRing, hole] }
  }, {
    style:{ fillColor:'#0A1828', fillOpacity:0.20, color:'transparent', weight:0, interactive:false }
  });
}

// ═══════════════════════════════════════════════════════════════
// DEFAULT STATE — barangay border + dim blue outside
// ═══════════════════════════════════════════════════════════════
function showBarangayBorder() {
  clearBoundaryLayers();
  var coords = getBrgyCoords(myBarangay);

  dimLayer = makeDimMask(coords);
  dimLayer.addTo(map);

  // Dashed blue border — same weight/style as BFP red border
  borderLayer = L.polygon(coords, {
    color:'#4A8EC2', weight:2.5, opacity:1.0,
    fillOpacity:0, dashArray:'4,6', interactive:false
  });
  borderLayer.addTo(map);

  map.fitBounds(borderLayer.getBounds(), { padding:[60,60] });
}

// ═══════════════════════════════════════════════════════════════
// REQUEST MODE — only Cebu City border, barangay border removed
// ═══════════════════════════════════════════════════════════════
function showCityBorder() {
  clearBoundaryLayers();

  dimLayer = makeDimMask(CEBU_CITY_COORDS);
  dimLayer.addTo(map);

  // Red dashed Cebu City border — identical to BFP map
  borderLayer = L.polygon(CEBU_CITY_COORDS, {
    color:'#4A8EC2', weight:2.0, opacity:0.9,
    fillOpacity:0, dashArray:'2,5', interactive:false
  });
  borderLayer.addTo(map);

  map.flyTo([10.3157,123.8854], 12, { duration:0.8 });
}

// ═══════════════════════════════════════════════════════════════
// CENTERS
// ═══════════════════════════════════════════════════════════════
function loadCenters(own, cross, city) {
  ownLayer.clearLayers(); crossLayer.clearLayers(); cityLayer.clearLayers();
  own.forEach(function(c)   { addPin(c,'own',  ownLayer);   });
  cross.forEach(function(c) { addPin(c,'cross',crossLayer); });
  city.forEach(function(c)  { addPin(c,'city', cityLayer);  });
}

function addPin(c, type, layer) {
  if (!c.lat || !c.lng) return;
  var isChosen = !!c.isChosen;
  // City pins: isFull => deeply faded (30%) via faded=true; otherwise inUse drives 50% fade
  var faded = (type === 'city' && c.isFull);
  L.marker([c.lat,c.lng], { icon:makeIcon(type, faded, c.inUse, isChosen) })
   .bindPopup(buildPopup(c,type), { maxWidth:240 }).addTo(layer);
}

function makeIcon(type, faded, inUse, isChosen) {
  var colors = { own:'#C05050', cross:'#4A8EC2', city:'#4A9A60', neighbor:'#4A8EC2' };
  var col = colors[type] || '#888';
  // Opacity rules (evaluated in order):
  //   neighbor pins:               40% (requestable)
  //   own/city not yet chosen:     40% (awaiting CHOOSE CENTER opt-in)
  //   city full (faded=true):      30%
  //   in use (has occupants):      50%
  //   otherwise:                   100%
  var op;
  if (type === 'neighbor')                                    op = 0.4;
  else if ((type === 'own' || type === 'city') && !isChosen)  op = 0.4;
  else if (faded)                                             op = 0.3;
  else if (inUse)                                             op = 0.5;
  else                                                        op = 1.0;
  return L.divIcon({
    html:'<div style="width:14px;height:14px;background:'+col+';transform:rotate(45deg);opacity:'+op+';box-shadow:0 0 6px '+col+';">' + '</div>',
    iconSize:[14,14], iconAnchor:[7,7], className:''
  });
}

function buildPopup(c, type) {
  var pct = c.capacity>0 ? Math.min(1,c.occupancy/c.capacity) : 0;
  var pctPx = Math.round(pct*100);
  var barColor = pct>=1 ? '#C05050' : pct>=0.8 ? '#C09A30' : '#4A9A60';
  var tc = {own:'#C05050',cross:'#4A8EC2',city:'#4A9A60',neighbor:'#888'}[type]||'#888';
  var tl = {own:'BARANGAY',cross:'CROSS-BRGY',city:'CITY-LEVEL',neighbor:'NEIGHBOR'}[type]||'';
  var slots = Math.max(0, c.capacity-c.occupancy);
  var btns = '';
  var inUse = !!c.inUse;
  var isChosen = !!c.isChosen;
  if (type==='own') {
    if (!isChosen) {
      // Not yet activated — single CHOOSE CENTER button registers it in Barangay_Chosen_Centers
      // and surfaces the center in the Centers tab + pickers.
      btns='<button class="p-btn" onclick="sendChooseCenter('+c.id+')">CHOOSE CENTER</button>';
    } else {
      // Already active: management actions only (UPDATE OCCUPANCY, DELETE CENTER).
      btns='<button class="p-btn" onclick="sendUpdateOcc('+c.id+','+c.capacity+','+c.occupancy+')">UPDATE OCCUPANCY</button>'
          +'<button class="p-btn-red" onclick="sendDeleteCenter('+c.id+',\''+esc(c.name)+'\')">DELETE CENTER</button>';
    }
  } else if (type==='neighbor') {
    btns='<button class="p-btn" onclick="sendRequest('+c.id+',\''+esc(c.name)+'\',\''+esc(c.barangay)+'\')">REQUEST THIS CENTER</button>';
  } else if (type==='city') {
    if (isChosen) {
      // Already opted-in for this barangay — no button, just a status message.
      btns='<div style="margin-top:5px;font-size:8px;color:#4A9A60;letter-spacing:1px;">ACTIVE FOR YOUR BRGY — manage from Centers tab</div>';
    } else if (c.isFull) {
      btns='<button class="p-btn-ghost" disabled style="opacity:0.35;cursor:not-allowed;">CHOOSE CENTER (FULL)</button>'
          +'<div style="margin-top:5px;font-size:8px;color:#C05050;letter-spacing:1px;">FULL — no slots available</div>';
    } else {
      btns='<button class="p-btn-ghost" onclick="sendChooseCenter('+c.id+')">CHOOSE CENTER</button>';
    }
  } else if (type==='cross') {
    // Cross-barangay center: approval already granted — no action needed from the map. [B2 fix]
    // Assignment now happens via the Register Family / Reassign dialogs which have a [CROSS-BRGY] section.
    btns='<div style="margin-top:5px;font-size:8px;color:#4A8EC2;letter-spacing:1px;">APPROVED — assign families from Affected Families tab</div>';
  } else {
    btns='<button class="p-btn-ghost" onclick="sendChooseCenter('+c.id+')">CHOOSE CENTER</button>';
  }
  return '<div class="p-title" style="color:'+tc+'">['+tl+'] '+esc(c.name)+'</div>'
        +'<div class="p-row">Barangay: <span>'+esc(c.barangay)+'</span></div>'
        +'<div class="p-row">Capacity: <span>'+c.capacity+'</span></div>'
        +'<div class="p-row">Occupied: <span>'+c.occupancy+'</span></div>'
        +'<div class="p-row">Available: <span style="color:#4A9A60">'+slots+'</span></div>'
        +'<div class="p-bar-bg"><div class="p-bar-fill" style="width:'+pctPx+'%;background:'+barColor+'"></div></div>'
        +btns;
}
// NEIGHBOR PINS
// ═══════════════════════════════════════════════════════════════
function loadNeighbors(neighbors) {
  neighborLayer.clearLayers();
  neighbors.forEach(function(c) {
    if (!c.lat||!c.lng) return;
    // Neighbors always pass isChosen=true so they never hit the "unchosen → 40%" branch.
    // Their fixed 40% opacity comes from the `type==='neighbor'` rule at the top of makeIcon.
    L.marker([c.lat,c.lng], { icon:makeIcon('neighbor', true, false, true) })
     .bindPopup(buildPopup(c,'neighbor'), { maxWidth:230 }).addTo(neighborLayer);
  });
}

function enterRequestMode() {
  requestMode = true;
  document.getElementById('request-banner').style.display = 'block';
  showCityBorder();        // remove barangay border, show cebu city border
}

function exitRequestMode() {
  requestMode = false;
  document.getElementById('request-banner').style.display = 'none';
  neighborLayer.clearLayers();
  showBarangayBorder();    // remove cebu city border, restore barangay border
}

// ═══════════════════════════════════════════════════════════════
// DROP PIN MODE
// ═══════════════════════════════════════════════════════════════
function enableDropMode() {
  if (requestMode) return;
  dropMode = true;
  document.getElementById('drop-banner').style.display = 'block';
  map.getContainer().style.cursor = 'crosshair';
}
function disableDropMode() {
  dropMode = false;
  document.getElementById('drop-banner').style.display = 'none';
  map.getContainer().style.cursor = '';
}

map.on('click', function(e) {
  if (!dropMode || requestMode) return;
  var lat = e.latlng.lat, lng = e.latlng.lng;
  if (!isInsideBarangay(lat, lng)) {
    showReject('x PLACEMENT OUTSIDE YOUR BARANGAY BOUNDARY');
    return;
  }
  disableDropMode();
  send({ type:'center_pin_dropped', lat:lat, lng:lng });
});

// Ray-casting point-in-polygon
function isInsideBarangay(lat, lng) {
  var poly = getBrgyCoords(myBarangay);
  var inside = false;
  for (var i=0, j=poly.length-1; i<poly.length; j=i++) {
    var xi=poly[i][0], yi=poly[i][1];
    var xj=poly[j][0], yj=poly[j][1];
    if (((yi>lng) !== (yj>lng)) && (lat < (xj-xi)*(lng-yi)/(yj-yi)+xi))
      inside = !inside;
  }
  return inside;
}

// ═══════════════════════════════════════════════════════════════
// POPUP ACTIONS
// ═══════════════════════════════════════════════════════════════
function sendChooseCenter(id) { map.closePopup(); send({type:'choose_center',centerId:id}); }
function sendUpdateOcc(id,cap,occ) { map.closePopup(); send({type:'open_update_occupancy',centerId:id,capacity:cap,currentOcc:occ}); }
function sendRequest(id,name,brgy) { map.closePopup(); send({type:'request_center',centerId:id,centerName:name,barangay:brgy}); }

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
var pendingDeleteCenterId = null;

function sendDeleteCenter(id, name) {
  pendingDeleteCenterId = id;
  map.closePopup();
  document.getElementById('delete-confirm-name').textContent = name || 'Selected center';
  document.getElementById('delete-confirm').classList.add('is-open');
  document.getElementById('delete-cancel-btn').focus();
}

function closeDeleteConfirm() {
  pendingDeleteCenterId = null;
  document.getElementById('delete-confirm').classList.remove('is-open');
}

document.getElementById('delete-cancel-btn').addEventListener('click', closeDeleteConfirm);
document.getElementById('delete-confirm').addEventListener('click', function(e) {
  if (e.target.id === 'delete-confirm') closeDeleteConfirm();
});
document.getElementById('delete-confirm-btn').addEventListener('click', function() {
  if (pendingDeleteCenterId === null) return;
  var centerId = pendingDeleteCenterId;
  closeDeleteConfirm();
  send({type:'delete_center', centerId:centerId});
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('delete-confirm').classList.contains('is-open')) {
    closeDeleteConfirm();
  }
});

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'").replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
