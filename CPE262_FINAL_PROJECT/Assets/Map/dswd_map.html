<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIRETRACK — DSWD City Centers Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#09131C; }
#map { width:100%; height:100%; }
#theme-btn {
  position:absolute; top:10px; right:10px; z-index:1001;
  background:#0C1A26; border:1px solid #1A4A3A; color:#4CAF90;
  font-family:Consolas,monospace; font-size:10px; font-weight:bold;
  letter-spacing:1px; padding:6px 12px; cursor:pointer;
  display:flex; align-items:center; gap:7px; user-select:none;
}
#theme-btn:hover { background:#0F2035; border-color:#4CAF90; color:#C8D8E8; }
#drop-banner, #reject-banner {
  display:none; position:absolute; z-index:1001;
  font-family:Consolas,monospace; font-size:10px; font-weight:bold;
  letter-spacing:2px; padding:7px 18px; pointer-events:none; white-space:nowrap;
  top:10px; left:50%; transform:translateX(-50%);
}
#drop-banner  { background:#1A4A3A; color:#C8D8E8; border:1px solid #4CAF90; }
#reject-banner{ top:auto; bottom:16px; background:#1A0808; color:#C05050; border:1px solid #7A2020; }
#loader {
  display:none; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); z-index:2000;
  background:rgba(9,19,28,0.92); color:#4CAF90;
  font-family:Consolas,monospace; font-size:11px; letter-spacing:2px;
  padding:12px 22px; border:1px solid #1A4A3A;
}
.leaflet-popup-content-wrapper {
  background:#0C1A26 !important; color:#C8D8E8;
  border:1px solid #253A52 !important; border-radius:0 !important;
  font-family:Consolas,monospace; font-size:11px;
  box-shadow:0 4px 20px rgba(0,0,0,0.8) !important;
}
.leaflet-popup-tip { background:#0C1A26 !important; }
.leaflet-popup-content { margin:12px 14px !important; min-width:200px; line-height:1.8; }
.p-title { font-size:11px; font-weight:bold; letter-spacing:1px; color:#4CAF90;
            border-bottom:1px solid #172435; padding-bottom:5px; margin-bottom:5px; }
.p-row { color:#3A5570; margin-bottom:1px; }
.p-row span { color:#C8D8E8; }
.p-bar-bg { background:#172435; height:3px; margin:6px 0; }
.p-bar-fill { height:3px; }
.p-btn { margin-top:7px; width:100%; background:#1A4A3A; border:none;
  color:#C8D8E8; font-family:Consolas,monospace; font-size:9px;
  font-weight:bold; letter-spacing:1px; padding:7px 0; cursor:pointer; }
.p-btn:hover { background:#215E4A; }
.p-btn-red { margin-top:5px; width:100%; background:transparent; border:1px solid #7A2020;
  color:#C05050; font-family:Consolas,monospace; font-size:9px;
  font-weight:bold; letter-spacing:1px; padding:6px 0; cursor:pointer; }
.p-btn-red:hover { background:#1A0808; }
.leaflet-control-zoom a {
  background:#0C1A26 !important; color:#4CAF90 !important; border-color:#1A4A3A !important; }
</style>
</head>

<button id="theme-btn" onclick="toggleTheme()">
  <span id="theme-icon">&#x2600;</span>
  <span id="theme-label">LIGHT MODE</span>
</button>
<div id="map"></div>

// ── STATE ─────────────────────────────────────────────────────────────────
var isDark   = true;
var dropMode = false;
var centerLayer = L.layerGroup();

var TILES = {
  dark:  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',    { maxZoom:19, subdomains:'abcd' }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd' })
};

var map = L.map('map', { center:[10.3157,123.8854], zoom:12, zoomControl:true, attributionControl:false });
TILES.dark.addTo(map);
centerLayer.addTo(map);

// Draw Cebu City boundary immediately
(function drawBoundary() {
  var worldRing = [[-180,-90],[-180,90],[180,90],[180,-90],[-180,-90]];
  var hole = CEBU_CITY.map(function(p){ return [p[1],p[0]]; });
  L.geoJSON({ type:'Feature', geometry:{ type:'Polygon', coordinates:[worldRing, hole] } }, {
    style:{ fillColor:'#000', fillOpacity:0.40, color:'transparent', weight:0, interactive:false }
  }).addTo(map);
  L.polygon(CEBU_CITY, {
    color:'#4CAF90', weight:2.0, opacity:0.9, fillOpacity:0, dashArray:'4,6', interactive:false
  }).addTo(map);
})();

function toggleTheme() {
  if (isDark) {
    map.removeLayer(TILES.dark); TILES.light.addTo(map);
    document.getElementById('theme-icon').innerHTML='&#x1F319;';
    document.getElementById('theme-label').textContent='DARK MODE';
  } else {
    map.removeLayer(TILES.light); TILES.dark.addTo(map);
    document.getElementById('theme-icon').innerHTML='&#x2600;';
    document.getElementById('theme-label').textContent='LIGHT MODE';
  }
  isDark = !isDark;
}

// ── BRIDGE ────────────────────────────────────────────────────────────────
function send(p) { window.chrome.webview.postMessage(JSON.stringify(p)); }

window.chrome.webview.addEventListener('message', function(e) {
  try {
    var msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'init_map':   /* nothing extra needed — boundary already drawn */ break;
      case 'load_centers': loadCenters(msg.centers||[]); break;
      case 'enable_drop_mode':  enableDropMode();  break;
      case 'cancel_drop_mode':  disableDropMode(); break;
    }
  } catch(err) { console.error('Bridge error', err); }
});

// ── CENTERS ───────────────────────────────────────────────────────────────
function loadCenters(centers) {
  centerLayer.clearLayers();
  centers.forEach(function(c) {
    if (!c.lat || !c.lng) return;
    L.marker([c.lat, c.lng], { icon: makeIcon(c.isFull) })
     .bindPopup(buildPopup(c), { maxWidth:240 })
     .addTo(centerLayer);
  });
}

function makeIcon(isFull) {
  var col = isFull ? '#C05050' : '#4CAF90';
  return L.divIcon({
    html:'<div style="width:14px;height:14px;background:'+col+';transform:rotate(45deg);box-shadow:0 0 8px '+col+';"></div>',
    iconSize:[14,14], iconAnchor:[7,7], className:''
  });
}

function buildPopup(c) {
  var pct    = c.capacity>0 ? Math.min(1, c.occupancy/c.capacity) : 0;
  var pctPx  = Math.round(pct*100);
  var barCol = pct>=1 ? '#C05050' : pct>=0.8 ? '#C09A30' : '#4CAF90';
  var slots  = Math.max(0, c.capacity-c.occupancy);
  return '<div class="p-title">[CITY-LEVEL] '+esc(c.name)+'</div>'
       + '<div class="p-row">Barangay: <span>'+esc(c.barangay)+'</span></div>'
       + '<div class="p-row">Capacity: <span>'+c.capacity+'</span></div>'
       + '<div class="p-row">Occupied: <span>'+c.occupancy+'</span></div>'
       + '<div class="p-row">Available: <span style="color:#4CAF90">'+slots+'</span></div>'
       + '<div class="p-bar-bg"><div class="p-bar-fill" style="width:'+pctPx+'%;background:'+barCol+'"></div></div>'
       + '<button class="p-btn" onclick="sendUpdateOcc('+c.id+','+c.capacity+','+c.occupancy+')">UPDATE OCCUPANCY</button>'
       + '<button class="p-btn" onclick="sendViewUsage('+c.id+')" style="background:#1A3A5A;margin-top:4px">VIEW USAGE REPORT</button>'
       + '<button class="p-btn-red" onclick="sendRemove('+c.id+',\''+esc(c.name)+'\')">REMOVE CENTER</button>';
}

// ── DROP PIN ──────────────────────────────────────────────────────────────
function enableDropMode() {
  dropMode=true;
  document.getElementById('drop-banner').style.display='block';
  map.getContainer().style.cursor='crosshair';
}
function disableDropMode() {
  dropMode=false;
  document.getElementById('drop-banner').style.display='none';
  map.getContainer().style.cursor='';
}

map.on('click', async function(e) {
  if (!dropMode) return;
  var lat=e.latlng.lat, lng=e.latlng.lng;
  if (!isInsideCity(lat, lng)) {
    var el=document.getElementById('reject-banner');
    el.style.display='block';
    setTimeout(function(){ el.style.display='none'; }, 3000);
    return;
  }
  disableDropMode();
  document.getElementById('loader').style.display='block';
  try {
    var res = await fetch(
      'https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&zoom=16&addressdetails=1',
      { headers: { 'Accept-Language': 'en' } }
    );
    var data = await res.json();
    var addr = data.address || {};
    var barangay = addr.suburb || addr.village || addr.quarter
                || addr.neighbourhood || addr.city_district || '';
    send({ type:'center_pin_dropped', lat:lat, lng:lng, barangay:barangay });
  } catch (err) {
    send({ type:'center_pin_dropped', lat:lat, lng:lng, barangay:'' });
  } finally {
    document.getElementById('loader').style.display='none';
  }
});

function isInsideCity(lat, lng) {
  var inside=false;
  for (var i=0,j=CEBU_CITY.length-1; i<CEBU_CITY.length; j=i++) {
    var xi=CEBU_CITY[i][0], yi=CEBU_CITY[i][1];
    var xj=CEBU_CITY[j][0], yj=CEBU_CITY[j][1];
    if (((yi>lng)!==(yj>lng))&&(lat<(xj-xi)*(lng-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// ── POPUP ACTIONS ─────────────────────────────────────────────────────────
function sendUpdateOcc(id, cap, occ) { map.closePopup(); send({type:'open_update_occupancy',centerId:id,capacity:cap,currentOcc:occ}); }
function sendViewUsage(id)           { map.closePopup(); send({type:'view_usage',centerId:id}); }
function sendRemove(id, name)        {
  if (!confirm('Remove "'+name+'" from the map?')) return;
  map.closePopup(); send({type:'remove_center',centerId:id});
}

function esc(s) { return String(s||'').replace(/'/g,"\\'").replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('load', function() { send({type:'dswd_map_ready'}); });
</script>
