<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIRETRACK Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0D1B2A;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .crosshair-cursor {
            cursor: crosshair !important;
        }

        #fade-overlay {
            position: absolute;
            inset: 0;
            z-index: 500;
            background: #0D1B2A;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #theme-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1001;
            background: #16202B;
            border: 1px solid #2A3F52;
            border-radius: 4px;
            color: #A0B4C8;
            font-family: Consolas, monospace;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 7px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            user-select: none;
        }

            #theme-btn:hover {
                background: #1E2D3D;
                border-color: #FF8070;
                color: #FF9B8A;
            }

        body.dark-mode #theme-btn {
            background: #1E2D3D;
            border-color: #FF8070;
            color: #FF9B8A;
        }

        #theme-btn .theme-icon {
            font-size: 14px;
            line-height: 1;
        }

        /* ── Analysis panel ─────────────────────────────────────── */
        #analysis-panel {
            display: none;
            position: absolute;
            top: 52px;
            right: 10px;
            z-index: 1001;
            background: #16202B;
            border: 1px solid #2A3F52;
            border-radius: 4px;
            padding: 10px;
            flex-direction: column;
            gap: 8px;
            width: 220px;
        }

            #analysis-panel.visible {
                display: flex;
            }

        #analysis-search {
            background: #0D1B2A;
            border: 1px solid #2A3F52;
            color: #fff;
            font-family: Consolas, monospace;
            font-size: 10px;
            padding: 6px 8px;
            border-radius: 3px;
            outline: none;
            width: 100%;
        }

            #analysis-search::placeholder {
                color: #4A6B8A;
            }

            #analysis-search:focus {
                border-color: #FFC107;
            }

        #analysis-lbl-btn,
        #analysis-border-btn {
            background: #3A2E10;
            border: 1px solid #FFC107;
            color: #FFC107;
            font-family: Consolas, monospace;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 5px 0;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
        }

            #analysis-lbl-btn:hover,
            #analysis-border-btn:hover {
                background: #4A3A10;
            }

            #analysis-lbl-btn.off,
            #analysis-border-btn.off {
                background: #1E2D3D;
                border-color: #2A3F52;
                color: #4A6B8A;
            }

        #analysis-legend {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

            #analysis-legend .leg-title {
                font-family: Consolas, monospace;
                font-size: 9px;
                letter-spacing: 1px;
                color: #4A6B8A;
            }

            #analysis-legend .leg-bar {
                height: 10px;
                border-radius: 2px;
                background: linear-gradient(to right, #FFE066, #FF4400, #6B0000);
            }

            #analysis-legend .leg-labels {
                display: flex;
                justify-content: space-between;
                font-family: Consolas, monospace;
                font-size: 9px;
                color: #4A6B8A;
            }

        #analysis-counter {
            font-family: Consolas, monospace;
            font-size: 9px;
            color: #4A6B8A;
            text-align: right;
        }

        /* ── Existing popup styles ───────────────────────────────── */
        .leaflet-popup-content-wrapper {
            background: #16202B;
            color: #fff;
            border: 1px solid #2A3F52;
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .leaflet-popup-tip {
            background: #16202B;
        }

        .leaflet-popup-content {
            margin: 12px 16px;
            line-height: 1.8;
            min-width: 220px;
        }

        .popup-title {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 8px;
            border-bottom: 1px solid #2A3F52;
            padding-bottom: 6px;
        }

        .popup-row {
            color: #A0B4C8;
            margin-bottom: 2px;
        }

            .popup-row span {
                color: #fff;
            }

        #drop-banner {
            display: none;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: #FF8070;
            color: #1A1A1A;
            font-family: Consolas, monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 8px 20px;
            border-radius: 4px;
            pointer-events: none;
            white-space: nowrap;
        }

        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            z-index: 2000;
            background: rgba(13,27,42,0.9);
            color: #FF9B8A;
            font-family: Consolas, monospace;
            font-size: 13px;
            letter-spacing: 2px;
            padding: 12px 24px;
            border-radius: 4px;
            border: 1px solid #2A3F52;
        }

        #reject-banner {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: #2D1A1A;
            color: #FF5252;
            font-family: Consolas, monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 10px 24px;
            border-radius: 4px;
            border: 1px solid #FF5252;
            white-space: nowrap;
            text-align: center;
        }

        /* ── Barangay centroid label ─────────────────────────────── */
        .brgy-label {
            background: transparent;
            border: none;
            font-family: Consolas, monospace;
            font-size: 8px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 3px #000, 0 0 3px #000, 0 0 3px #000;
            white-space: nowrap;
            pointer-events: none;
            line-height: 1;
        }

        /* ── Location search bar (always visible, hidden in analysis mode) ── */
        #loc-search-bar {
            display: flex;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1001;
            gap: 0;
            align-items: center;
        }

            #loc-search-bar.hidden {
                display: none;
            }

        #loc-search-input {
            background: #16202B;
            border: 1px solid #2A3F52;
            border-right: none;
            border-radius: 4px 0 0 4px;
            color: #fff;
            font-family: Consolas, monospace;
            font-size: 10px;
            padding: 7px 10px;
            outline: none;
            width: 180px;
        }

            #loc-search-input::placeholder {
                color: #4A6B8A;
            }

            #loc-search-input:focus {
                border-color: #FF5252;
            }

        #loc-clear-btn {
            background: #16202B;
            border: 1px solid #2A3F52;
            border-radius: 0 4px 4px 0;
            color: #4A6B8A;
            font-family: Consolas, monospace;
            font-size: 10px;
            padding: 7px 8px;
            cursor: pointer;
            line-height: 1;
        }

            #loc-clear-btn:hover {
                color: #FF5252;
                border-color: #FF5252;
            }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <!-- ── Location / barangay quick-search (normal mode only) ── -->
    <div id="loc-search-bar">
        <input id="loc-search-input" type="text" placeholder="Search barangay..."
               oninput="locSearch(this.value)" />
        <button id="loc-clear-btn" onclick="locClear()" title="Clear">&#x2715;</button>
    </div>

    <button id="theme-btn" onclick="toggleTheme()">
        <span class="theme-icon">🌙</span>
        <span id="theme-label">DARK MODE</span>
    </button>

    <!-- ── Analysis floating panel (visible only in analysis mode) ── -->
    <div id="analysis-panel">
        <input id="analysis-search" type="text" placeholder="Search barangay..."
               oninput="searchAnalysis(this.value)" />
        <button id="analysis-lbl-btn" onclick="toggleAnalysisLabels()">LABELS ON</button>
        <button id="analysis-border-btn" class="off" onclick="toggleAnalysisBorders()">BORDERS OFF</button>
        <div id="analysis-legend">
            <div class="leg-title">SEVERITY SCALE</div>
            <div class="leg-bar"></div>
            <div class="leg-labels"><span>NO INCIDENTS</span><span>HIGH</span></div>
        </div>
        <div id="analysis-counter"></div>
    </div>

    <div id="drop-banner">CLICK MAP TO DROP FIRE PIN</div>
    <div id="loader">GEOCODING...</div>
    <div id="reject-banner">CANNOT DROP PIN OUTSIDE THE BOUNDARY</div>
    <div id="map"></div>

        // ═══════════════════════════════════════════════════════════════
        // POINT-IN-POLYGON — ray-casting for Cebu City boundary check
        // ═══════════════════════════════════════════════════════════════
        function isInsideCebuCity(lat, lng) {
            const polygon = CEBU_CITY_BOUNDARY;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];
                const intersect = ((yi > lng) !== (yj > lng)) &&
                    (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        let dropMode = false, activeDropPin = null;
        let incidentLayer = L.layerGroup().addTo(map);

        // ── Analysis mode state ──────────────────────────────────────────
        let analysisMode = false;
        let analysisLabelsOn = true;
        let analysisBordersOn = false;
        let analysisLayers = {};
        let selectedBrgyName = null;

        // ═══════════════════════════════════════════════════════════════
        // THEME TOGGLE
        // ═══════════════════════════════════════════════════════════════
        function toggleTheme() {
            if (isTransitioning) return;
            isTransitioning = true;
            const overlay = document.getElementById('fade-overlay');
            const icon = document.querySelector('#theme-btn .theme-icon');
            const label = document.getElementById('theme-label');
            overlay.style.transition = 'opacity 0.30s ease';
            overlay.style.opacity = '1';
            setTimeout(function () {
                if (isDarkMode) {
                    map.removeLayer(TILES.dark); TILES.light.addTo(map);
                    icon.textContent = '🌙'; label.textContent = 'DARK MODE';
                    document.body.classList.remove('dark-mode');
                } else {
                    map.removeLayer(TILES.light); TILES.dark.addTo(map);
                    icon.textContent = '☀️'; label.textContent = 'LIGHT MODE';
                    document.body.classList.add('dark-mode');
                }
                isDarkMode = !isDarkMode;
                setTimeout(function () {
                    overlay.style.transition = 'opacity 0.40s ease';
                    overlay.style.opacity = '0';
                    setTimeout(() => { isTransitioning = false; }, 420);
                }, 180);
            }, 320);
        }

        // ═══════════════════════════════════════════════════════════════
        // CITY BOUNDARY DRAWING
        // ═══════════════════════════════════════════════════════════════
        function drawCityBoundary() {
            const worldRing = [[-90, -180], [-90, 180], [90, 180], [90, -180]];
            const cityHole = [...CEBU_CITY_BOUNDARY].reverse();
            const maskFeature = {
                type: "Feature",
                geometry: {
                    type: "Polygon", coordinates: [
                        worldRing.map(([lat, lng]) => [lng, lat]),
                        cityHole.map(([lat, lng]) => [lng, lat])
                    ]
                },
                properties: {}
            };
            L.geoJSON(maskFeature, {
                style: { fillColor: '#3D0000', fillOpacity: 0.10, color: 'transparent', weight: 0, interactive: false }
            }).addTo(map);
            L.polygon(CEBU_CITY_BOUNDARY, {
                color: '#FF3333', weight: 2.0, opacity: 0.9, fillOpacity: 0, dashArray: '2,5', interactive: false
            }).addTo(map);
        }

        // ═══════════════════════════════════════════════════════════════
        // DROP PIN MODE
        // ═══════════════════════════════════════════════════════════════
        function enableDropMode() {
            dropMode = true;
            document.getElementById('drop-banner').style.display = 'block';
            document.getElementById('map').classList.add('crosshair-cursor');
        }
        function disableDropMode() {
            dropMode = false;
            document.getElementById('drop-banner').style.display = 'none';
            document.getElementById('map').classList.remove('crosshair-cursor');
        }

        map.on('click', async function (e) {
            if (!dropMode) return;
            const lat = e.latlng.lat, lng = e.latlng.lng;

            if (!isInsideCebuCity(lat, lng)) {
                showRejectBanner('CANNOT DROP PIN OUTSIDE THE BOUNDARY');
                sendToApp({ type: 'pin_rejected', reason: 'outside_cebu_city', lat, lng });
                return;
            }

            if (activeDropPin) map.removeLayer(activeDropPin);
            activeDropPin = L.marker([lat, lng], { icon: fireIcon() }).addTo(map);
            disableDropMode();
            showLoader(true);

            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=16&addressdetails=1`,
                    { headers: { 'Accept-Language': 'en' } }
                );
                const data = await res.json();
                const addr = data.address || {};
                const barangay = addr.suburb || addr.village || addr.quarter
                    || addr.neighbourhood || addr.city_district || '';
                const sitio = addr.road || addr.hamlet || addr.residential || '';
                sendToApp({
                    type: 'pin_dropped', lat, lng, barangay, sitio,
                    display: data.display_name || '', raw: addr
                });
            } catch (err) {
                sendToApp({ type: 'pin_dropped', lat, lng, barangay: '', sitio: '', error: err.message });
            } finally {
                showLoader(false);
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // C# ↔ JS BRIDGE
        // ═══════════════════════════════════════════════════════════════
        window.chrome.webview.addEventListener('message', function (e) {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'enable_drop_mode') enableDropMode();
                if (msg.type === 'cancel_drop_mode') {
                    disableDropMode();
                    if (activeDropPin) { map.removeLayer(activeDropPin); activeDropPin = null; }
                }
                if (msg.type === 'load_incidents') loadIncidents(msg.incidents);
                if (msg.type === 'fly_to') map.flyTo([msg.lat, msg.lng], msg.zoom || 15);
                if (msg.type === 'analysis_mode') enterAnalysisMode(msg.barangays);
                if (msg.type === 'exit_analysis') exitAnalysisMode();
            } catch (err) { console.error('Bridge error:', err); }
        });
        function sendToApp(payload) {
            window.chrome.webview.postMessage(JSON.stringify(payload));
        }

        // ═══════════════════════════════════════════════════════════════
        // INCIDENT MARKERS
        // ═══════════════════════════════════════════════════════════════
        function loadIncidents(incidents) {
            incidentLayer.clearLayers();
            if (!incidents || !incidents.length) return;
            incidents.forEach(function (inc) {
                if (!inc.lat || !inc.lng) return;
                const icon = incidentIcon(inc.status);
                L.marker([inc.lat, inc.lng], { icon })
                    .bindPopup(buildPopup(inc), { maxWidth: 260 })
                    .addTo(incidentLayer);
            });
        }

        function incidentIcon(status) {
            const s = (status || '').toLowerCase();
            const base = 'width:14px;height:14px;transform:rotate(45deg);box-shadow:0 0 6px ';
            if (s === 'active') {
                return L.divIcon({
                    html: `<div style="${base}#FF5252;background:#FF5252;"></div>`,
                    iconSize: [14, 14], iconAnchor: [7, 14], className: ''
                });
            }
            if (s === 'under control') {
                return L.divIcon({
                    html: `<div style="${base}#FF9800;background:#FF9800;"></div>`,
                    iconSize: [14, 14], iconAnchor: [7, 14], className: ''
                });
            }
            return L.divIcon({
                html: `<div style="${base}#9CA3AF;background:#9CA3AF;opacity:0.5;"></div>`,
                iconSize: [14, 14], iconAnchor: [7, 14], className: ''
            });
        }

        function buildPopup(inc) {
            const s = (inc.status || '').toLowerCase();
            const titleText = s === 'active' ? 'ACTIVE FIRE' : s === 'under control' ? 'UNDER CONTROL' : 'FIRE OUT';
            const titleColor = s === 'active' ? '#FF5252' : s === 'under control' ? '#FF9800' : '#9CA3AF';
            const updateBtn = `<button onclick="requestStatusUpdate(${inc.id})"
        style="margin-top:2px;width:100%;background:#1E2D3D;border:1px solid #2A3F52;
               color:#A0B4C8;font-family:Consolas,monospace;font-size:10px;font-weight:bold;
               letter-spacing:1px;padding:8px 0;border-radius:3px;cursor:pointer;">
        UPDATE INCIDENT STATUS</button>`;
            const deleteBtn = `<button onclick="requestIncidentDelete(${inc.id})"
        style="margin-top:6px;width:100%;background:#2D1A1A;border:1px solid #C05050;
               color:#FF8070;font-family:Consolas,monospace;font-size:10px;font-weight:bold;
               letter-spacing:1px;padding:8px 0;border-radius:3px;cursor:pointer;">
        DELETE INCIDENT</button>`;
            return `
        <div class="popup-title" style="color:${titleColor};">${titleText}</div>
        <div class="popup-row">Barangay: <span>${inc.barangay}</span></div>
        <div class="popup-row">Sitio: <span>${inc.sitio || '—'}</span></div>
        <div class="popup-row">Alarm Level: <span>Level ${inc.alarmLevel}</span></div>
        <div class="popup-row">Cause: <span>${inc.cause || '—'}</span></div>
        <div class="popup-row">Date: <span>${inc.dateTime}</span></div>
        <hr style="border:none;border-top:1px solid #2A3F52;margin:8px 0 6px;"/>
        ${updateBtn}
        ${deleteBtn}`;
        }

        function requestStatusUpdate(incidentId) {
            sendToApp({ type: 'request_status_update', incidentId });
        }

        function requestIncidentDelete(incidentId) {
            map.closePopup();
            sendToApp({ type: 'request_delete_incident', incidentId });
        }

        function fireIcon() {
            return L.divIcon({
                html: `<div style="width:16px;height:16px;background:#FF5252;transform:rotate(45deg);box-shadow:0 0 10px #FF5252;border:2px solid #FF8070;"></div>`,
                iconSize: [16, 16], iconAnchor: [8, 16], className: ''
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // ANALYSIS MODE
        // ═══════════════════════════════════════════════════════════════

        function severityColor(score, maxScore) {
            if (maxScore === 0) return '#FFE066';
            const t = Math.min(score / maxScore, 1);
            let r, g, b;
            if (t < 0.5) {
                const u = t * 2;
                r = 0xFF;
                g = Math.round(0xE0 + (0x44 - 0xE0) * u);
                b = Math.round(0x66 + (0x00 - 0x66) * u);
            } else {
                const u = (t - 0.5) * 2;
                r = Math.round(0xFF + (0x6B - 0xFF) * u);
                g = Math.round(0x44 + (0x00 - 0x44) * u);
                b = 0;
            }
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        function enterAnalysisMode(barangays) {
            analysisMode = true;
            document.getElementById('loc-search-bar').classList.add('hidden');

            const stats = {};
            let maxScore = 0;
            if (barangays && barangays.length) {
                barangays.forEach(function (b) {
                    const score = (b.count || 0) * (b.avgAlarm || 1);
                    stats[b.name.toLowerCase()] = { count: b.count || 0, avgAlarm: b.avgAlarm || 0, score };
                    if (score > maxScore) maxScore = score;
                });
            }

            map.removeLayer(incidentLayer);
            clearAnalysisLayers();
            analysisLayers = {};

            Object.keys(BARANGAY_COORDS).forEach(function (name) {
                const bd = BARANGAY_COORDS[name];
                const key = name.toLowerCase();
                const st = stats[key] || { count: 0, avgAlarm: 0, score: 0 };
                const color = severityColor(st.score, maxScore);
                const border = analysisBorderStyle(name, color, false);

                const poly = L.polygon(bd.coords, {
                    color: border.color, weight: border.weight, opacity: border.opacity,
                    fillColor: color, fillOpacity: 0.45, interactive: true
                });

                poly.on('mouseover', () => poly.setStyle(analysisPolyStyle(name, color, true, 0.72)));
                poly.on('mouseout', () => {
                    poly.setStyle(analysisPolyStyle(
                        name,
                        color,
                        false,
                        selectedBrgyName === name ? 0.72 : 0.45));
                });
                poly.on('click', function () {
                    if (selectedBrgyName && analysisLayers[selectedBrgyName])
                        analysisLayers[selectedBrgyName].poly.setStyle(analysisPolyStyle(
                            selectedBrgyName,
                            analysisLayers[selectedBrgyName].color,
                            false,
                            0.45));
                    selectedBrgyName = name;
                    poly.setStyle(analysisPolyStyle(name, color, true, 0.72));
                    poly.bindPopup(buildAnalysisPopup(name, st), { maxWidth: 240 }).openPopup();
                    sendToApp({ type: 'brgy_selected', barangay: name, count: st.count, avgAlarm: st.avgAlarm });
                });
                poly.addTo(map);

                const label = L.marker([bd.clat, bd.clng], {
                    icon: L.divIcon({ className: 'brgy-label', html: name, iconAnchor: [0, 0] }),
                    interactive: false, zIndexOffset: -1000
                });
                if (analysisLabelsOn) label.addTo(map);

                analysisLayers[name] = { poly, label, visible: true, color };
            });

            document.getElementById('analysis-panel').classList.add('visible');
            document.getElementById('analysis-search').value = '';
            updateAnalysisCounter();
        }

        function buildAnalysisPopup(name, st) {
            return `
        <div class="popup-title" style="color:#FFC107;">${name}</div>
        <div class="popup-row">Incidents: <span>${st.count}</span></div>
        ${st.avgAlarm ? `<div class="popup-row">Avg Alarm Level: <span>${st.avgAlarm.toFixed(1)}</span></div>` : ''}
        <div class="popup-row">Severity Score: <span>${st.score.toFixed(1)}</span></div>
        <hr style="border:none;border-top:1px solid #2A3F52;margin:8px 0 6px;"/>
        <div style="font-size:10px;color:#4A6B8A;">Charts loading in side panel</div>`;
        }

        function exitAnalysisMode() {
            analysisMode = false;
            document.getElementById('loc-search-bar').classList.remove('hidden');
            selectedBrgyName = null;
            clearAnalysisLayers();
            analysisLayers = {};
            map.addLayer(incidentLayer);
            document.getElementById('analysis-panel').classList.remove('visible');
            document.getElementById('analysis-search').value = '';
        }

        function clearAnalysisLayers() {
            Object.values(analysisLayers).forEach(function (l) {
                map.removeLayer(l.poly);
                map.removeLayer(l.label);
            });
        }

        // ── Labels toggle ────────────────────────────────────────────────
        function toggleAnalysisLabels() {
            analysisLabelsOn = !analysisLabelsOn;
            const btn = document.getElementById('analysis-lbl-btn');
            btn.textContent = analysisLabelsOn ? 'LABELS ON' : 'LABELS OFF';
            btn.className = analysisLabelsOn ? '' : 'off';
            Object.values(analysisLayers).forEach(function (l) {
                if (!l.visible) return;
                analysisLabelsOn ? l.label.addTo(map) : map.removeLayer(l.label);
            });
        }

        // ── Live search (analysis mode) ──────────────────────────────────
        function analysisBorderStyle(name, color, emphasized) {
            if (!analysisBordersOn)
                return { color: 'transparent', weight: 0, opacity: 0 };

            return {
                color: color,
                weight: emphasized || selectedBrgyName === name ? 2.5 : 1.5,
                opacity: 0.95
            };
        }

        function analysisPolyStyle(name, color, emphasized, fillOpacity) {
            const style = analysisBorderStyle(name, color, emphasized);
            style.fillOpacity = fillOpacity;
            return style;
        }

        function toggleAnalysisBorders() {
            analysisBordersOn = !analysisBordersOn;
            const btn = document.getElementById('analysis-border-btn');
            btn.textContent = analysisBordersOn ? 'BORDERS ON' : 'BORDERS OFF';
            btn.className = analysisBordersOn ? '' : 'off';

            Object.keys(analysisLayers).forEach(function (name) {
                const l = analysisLayers[name];
                l.poly.setStyle(analysisPolyStyle(
                    name,
                    l.color,
                    false,
                    selectedBrgyName === name ? 0.72 : 0.45));
            });
        }

        function searchAnalysis(val) {
            const q = val.toLowerCase().trim();
            let shown = 0;
            Object.keys(analysisLayers).forEach(function (name) {
                const l = analysisLayers[name];
                const match = !q || name.toLowerCase().includes(q);
                l.visible = match;
                if (match) {
                    l.poly.addTo(map);
                    if (analysisLabelsOn) l.label.addTo(map);
                    shown++;
                } else {
                    map.removeLayer(l.poly);
                    map.removeLayer(l.label);
                }
            });
            updateAnalysisCounter(shown);
            if (q) {
                const vis = Object.values(analysisLayers).filter(l => l.visible).map(l => l.poly);
                if (vis.length) map.fitBounds(L.featureGroup(vis).getBounds().pad(0.2));
            }
        }

        function updateAnalysisCounter(shown) {
            const total = Object.keys(analysisLayers).length;
            const n = shown !== undefined ? shown : total;
            document.getElementById('analysis-counter').textContent = n + ' / ' + total + ' barangays';
        }

        // ── Location / barangay quick-search (BFP normal mode) ───────────
        var locHighlightLayer = null;

        function locSearch(val) {
            var q = val.trim().toLowerCase();
            if (locHighlightLayer) { map.removeLayer(locHighlightLayer); locHighlightLayer = null; }
            if (!q) { locReset(); return; }
            var match = Object.keys(BARANGAY_COORDS).find(function (name) {
                return name.toLowerCase().startsWith(q) || name.toLowerCase().includes(q);
            });
            if (!match) return;
            var bd = BARANGAY_COORDS[match];
            locHighlightLayer = L.polygon(bd.coords, {
                color: '#FF5252', weight: 2.5, opacity: 0.9,
                fillColor: '#FF5252', fillOpacity: 0.18, interactive: false
            }).addTo(map);
            map.flyTo([bd.clat, bd.clng], 15, { duration: 0.8 });
        }

        function locClear() {
            document.getElementById('loc-search-input').value = '';
            if (locHighlightLayer) { map.removeLayer(locHighlightLayer); locHighlightLayer = null; }
            locReset();
        }

        function locReset() {
            map.flyTo([10.3157, 123.8854], 12, { duration: 0.8 });
        }

        // ── Helpers ───────────────────────────────────────────────────────
        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }
        function showRejectBanner(msg) {
            const el = document.getElementById('reject-banner');
            el.textContent = msg; el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3500);
        }

        // ═══════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('load', function () {
            drawCityBoundary();
            sendToApp({ type: 'map_ready' });
        });

    </script>
</body>
</html>
